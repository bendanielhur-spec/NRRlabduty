// ── DOM HELPERS ───────────────────────────────────────────────
const el=(tag,attrs={},children=[])=>{
  const e=document.createElement(tag);
  Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object"){Object.assign(e.style,v)}
    else if(k.startsWith("on")&&typeof v==="function"){e.addEventListener(k.slice(2).toLowerCase(),v)}
    else if(k==="className"){e.className=v}
    else if(k==="htmlFor"){e.htmlFor=v}
    else if(k==="checked"){e.checked=v}
    else if(k==="disabled"){e.disabled=v}
    else if(k==="value"&&(tag==="input"||tag==="select"||tag==="textarea")){e.value=v}
    else if(k==="readOnly"){e.readOnly=v}
    else if(k==="type"){e.type=v}
    else if(k==="placeholder"){e.placeholder=v}
    else if(k==="maxLength"){e.maxLength=v}
    else if(k==="colSpan"){e.colSpan=v}
    else if(k==="accept"){e.accept=v}
    else{e.setAttribute(k,v)}
  });
  children.forEach(c=>{
    if(c==null||c===false||c===undefined)return;
    if(typeof c==="string"||typeof c==="number"){e.appendChild(document.createTextNode(c))}
    else{e.appendChild(c)}
  });
  return e;
};

// ── ICS ───────────────────────────────────────────────────────
function makeICS(events){
  const p=n=>String(n).padStart(2,"0");
  const dt=(d,h)=>`${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}T${p(h)}0000`;
  let s="BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//LabDuties//EN\r\nCALSCALE:GREGORIAN\r\nMETHOD:PUBLISH\r\n";
  events.forEach(ev=>{
    s+="BEGIN:VEVENT\r\n";
    s+="UID:"+ev.uid+"\r\n";
    s+="DTSTART:"+dt(ev.date,10)+"\r\n";
    s+="DTEND:"+dt(ev.date,11)+"\r\n";
    s+="SUMMARY:"+ev.title+"\r\n";
    s+="BEGIN:VALARM\r\nTRIGGER:-PT60M\r\nACTION:DISPLAY\r\nDESCRIPTION:Reminder: "+ev.title+"\r\nEND:VALARM\r\n";
    s+="END:VEVENT\r\n";
  });
  s+="END:VCALENDAR";
  return s;
}
function dlFile(name,content,type){
  const b=new Blob([content],{type});
  const u=URL.createObjectURL(b);
  const a=document.createElement("a");a.href=u;a.download=name;a.click();
  setTimeout(()=>URL.revokeObjectURL(u),1000);
}

function openMail(to,cc,sub,body){
  const ccPart=cc.length?"&cc="+encodeURIComponent(cc.join(",")):"";
  window.open("mailto:"+encodeURIComponent(to)+"?"+ccPart+"subject="+encodeURIComponent(sub)+"&body="+encodeURIComponent(body),"_blank");
  const newLog=[{id:Date.now(),to,cc:cc.join(", "),sub,body,at:new Date().toLocaleTimeString("en-IL")},...STATE.emailLog];
  setState({emailLog:newLog});
}

// ── DUTIES ────────────────────────────────────────────────────
function getDuties(d,pid){
  const dn=WDAYS[d.getDay()];if(!WORK.has(dn))return[];
  return STATE.tasks.filter(t=>t.days[dn]&&(pid!==undefined?t.aId===pid:true))
    .map(t=>({task:t,key:`${t.id}-${toStr(d)}`,aId:t.aId,date:d}));
}
const statusOf=key=>STATE.actions[key]?.status||"pending";

function sendReminders(targetDate){
  const date=targetDate||TODAY;
  const duties=getDuties(date).filter(x=>!x.task.noMark&&statusOf(x.key)==="pending");
  if(!duties.length){toast3("No pending tasks for that day");return}
  const byP={};
  duties.forEach(d=>{
    const p=STATE.people.find(pp=>pp.id===d.aId);if(!p)return;
    if(!byP[p.id])byP[p.id]={person:p,tasks:[]};
    byP[p.id].tasks.push(d.task);
  });
  const entries=Object.values(byP);if(!entries.length)return;
  const to=entries.map(e=>e.person.email).join(",");
  const body="Hi everyone,\n\nPending lab duties for "+fmtD(date)+":\n\n"
    +entries.map(e=>"\uD83D\uDC64 "+dname(e.person)+":\n"+e.tasks.map(t=>"   "+t.emoji+" "+t.title).join("\n")).join("\n\n")
    +"\n\nPlease mark your tasks done in LabDuties.\n\nRegev-Rudzki Lab";
  openMail(to,[],"\u23F0 LabDuties Reminder \u2013 "+fmtD(date),body);
  toast3("Reminder opened \u2713");
}

function sendCalendarInvites(){
  const sun=nextSun();const byP={};
  for(let i=0;i<5;i++){
    const d=new Date(sun);d.setDate(sun.getDate()+i);
    getDuties(d).forEach(x=>{
      const p=STATE.people.find(pp=>pp.id===x.aId);if(!p)return;
      if(!byP[p.id])byP[p.id]={person:p,days:{}};
      const dk=toStr(d);
      if(!byP[p.id].days[dk])byP[p.id].days[dk]={date:d,tasks:[]};
      byP[p.id].days[dk].tasks.push(x.task);
    });
  }
  const entries=Object.values(byP);
  if(!entries.length){toast3("No tasks scheduled next week");return}
  const thu=new Date(sun);thu.setDate(sun.getDate()+4);
  const weekStr=fmtD(sun)+" \u2013 "+fmtD(thu);
  entries.forEach((entry,idx)=>{
    const p=entry.person;
    const dayEntries=Object.values(entry.days);
    const lines=dayEntries.map(de=>"\uD83D\uDCC5 "+fmtD(de.date)+" at 10:00\u201311:00 AM:\n"+de.tasks.map(t=>"   "+t.emoji+" "+t.title).join("\n"));
    const body="Hi "+(p.nick||p.full_name)+",\n\nYour lab duties for next week ("+weekStr+"):\n\n"
      +lines.join("\n\n")
      +"\n\nTo add to Outlook:\n1. Create a new event on each date listed\n2. Set time 10:00\u201311:00 AM\n3. Add a 1-hour reminder\n\nRegev-Rudzki Lab";
    setTimeout(()=>openMail(p.email,[],"\uD83D\uDCC5 LabDuties \u2013 Your tasks for "+weekStr,body),idx*400);
  });
  toast3("Calendar invite emails opening for "+entries.length+" people\u2026");
}

function downloadMyICS(){
  const me=STATE.people.find(p=>p.email===STATE.session);
  if(!me)return;
  const sun=nextSun();const evs=[];
  for(let i=0;i<5;i++){
    const d=new Date(sun);d.setDate(sun.getDate()+i);
    getDuties(d,me.id).forEach(x=>evs.push({uid:"ld-"+x.key+"@wiz",date:d,title:x.task.title}));
  }
  if(!evs.length){toast3("No tasks next week");return}
  dlFile("LabDuties_MyWeek.ics",makeICS(evs),"text/calendar;charset=utf-8");
  toast3("\uD83D\uDCC5 .ics downloaded \u2014 import into Outlook!");
}

  dlFile("LabDuties_AllTeam.ics",makeICS(evs),"text/calendar;charset=utf-8");
  toast3("\uD83D\uDCC5 All-team .ics downloaded!");
}

function Btn(text,onClick,variant="dark",opts={}){
  const VS={
    dark:{bg:"#1a1a2e",c:"#fff",bd:"none"},
    teal:{bg:"#4ECDC4",c:"#fff",bd:"none"},
    green:{bg:"#16a34a",c:"#fff",bd:"none"},
    yellow:{bg:"#FFE66D",c:"#333",bd:"none"},
    purple:{bg:"#7C3AED",c:"#fff",bd:"none"},
    ghost:{bg:"#EFEFEF",c:"#333",bd:"none"},
    danger:{bg:"#fff",c:"#dc3545",bd:"1px solid #dc3545"},
    red:{bg:"#dc3545",c:"#fff",bd:"none"},
  };
  const s=VS[variant]||VS.dark;
  const b=btn({
    style:{
      background:s.bg,color:s.c,border:s.bd,
      padding:opts.sm?"5px 11px":"10px 16px",
      borderRadius:"9px",fontSize:opts.sm?"11px":"14px",fontWeight:"600",
      cursor:opts.disabled?"not-allowed":"pointer",
      display:"inline-flex",alignItems:"center",justifyContent:"center",gap:"5px",
      opacity:opts.disabled?0.45:1,
      width:opts.full?"100%":undefined,
      marginBottom:"0"
    },
    onClick:e=>{e.preventDefault();if(!opts.disabled)onClick(e)},
    disabled:!!opts.disabled
  },[text]);
  return b;
}

function Field(labelText,child,opts={}){
  const children=[child];
  if(opts.note)children.push(p_({style:{fontSize:"11px",color:"#888",marginTop:"4px"}},[opts.note]));
  if(opts.error)children.push(p_({style:{fontSize:"12px",color:"#dc3545",marginTop:"4px",fontWeight:"500"}},{},[["\u26A0 "+opts.error]]));
  const f=div({style:{marginBottom:"16px"}});
  if(labelText)f.appendChild(label_({style:{display:"block",fontSize:"13px",fontWeight:"600",marginBottom:"5px",color:"#444"}},[labelText]));
  if(opts.error){
    const ep=document.createElement("p");
    ep.style.cssText="font-size:12px;color:#dc3545;margin-top:4px;font-weight:500";
    ep.textContent="\u26A0 "+opts.error;
    children.push(ep);
  }
  if(opts.note){
    const np=document.createElement("p");
    np.style.cssText="font-size:11px;color:#888;margin-top:4px";
    np.textContent=opts.note;
    children.push(np);
  }
  f.appendChild(child);
  if(opts.note){const np=document.createElement("p");np.style.cssText="font-size:11px;color:#888;margin-top:4px";np.textContent=opts.note;f.appendChild(np)}
  if(opts.error){const ep=document.createElement("p");ep.style.cssText="font-size:12px;color:#dc3545;margin-top:4px;font-weight:500";ep.textContent="\u26A0 "+opts.error;f.appendChild(ep)}
  return f;
}

// ── LOGIN PAGE ────────────────────────────────────────────────
function LoginPage(){
  const saved=LS.get("ld_remember","");
  let email=saved,pwd="",err="",showPwd=false;

  const wrap=div({});
  function rebuild(){
    wrap.innerHTML="";
    const shakeDiv=div({className:err?"shake":""});

    const emailInp=inp({type:"email",value:email,placeholder:"you"+WZ,style:inpStyle(false,!!err)});
    emailInp.addEventListener("input",e=>{email=e.target.value;err="";rebuild()});
    emailInp.addEventListener("keydown",e=>{if(e.key==="Enter")submit()});

    const pwdInp=inp({type:showPwd?"text":"password",value:pwd,placeholder:"Your password",style:{...inpStyle(),paddingRight:"44px"}});
    pwdInp.addEventListener("input",e=>{pwd=e.target.value;err="";rebuild()});
    pwdInp.addEventListener("keydown",e=>{if(e.key==="Enter")submit()});

    const eyeBtn=btn({style:{position:"absolute",right:"12px",top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:"16px",color:"#aaa",padding:"0"}},
      [showPwd?"\uD83D\uDE48":"\uD83D\uDC41\uFE0F"]);
    eyeBtn.addEventListener("click",e=>{e.preventDefault();showPwd=!showPwd;rebuild()});

    shakeDiv.appendChild(Field("Weizmann Email",emailInp,{error:err}));
    const pwdWrap=div({style:{position:"relative"}},[pwdInp,eyeBtn]);
    shakeDiv.appendChild(Field("Password",pwdWrap));
    wrap.appendChild(h2_({style:{fontSize:"24px",marginBottom:"6px",color:"#1a1a2e"}},["Welcome back"]));
    wrap.appendChild(p_({style:{fontSize:"13px",color:"#888",marginBottom:"22px"}},["Sign in with your Weizmann account"]));
    wrap.appendChild(shakeDiv);
    wrap.appendChild(Btn("Sign In \u2192",submit,"dark",{full:true}));
    const links=div({style:{display:"flex",justifyContent:"space-between",marginTop:"16px"}});
    const forgotB=btn({style:{background:"none",border:"none",color:"#4ECDC4",fontSize:"13px",cursor:"pointer",fontWeight:"600"}},["Forgot password?"]);
    forgotB.addEventListener("click",()=>setState({authPage:"forgot"}));
    const regB=btn({style:{background:"none",border:"none",color:"#888",fontSize:"13px",cursor:"pointer"}},["New? Register"]);
    regB.addEventListener("click",()=>setState({authPage:"register"}));
    links.appendChild(forgotB);links.appendChild(regB);
    wrap.appendChild(links);
    if(saved){
      const diffB=btn({style:{background:"none",border:"none",color:"#bbb",fontSize:"11px",cursor:"pointer",display:"block",margin:"10px auto 0"}},["Use a different account"]);
      diffB.addEventListener("click",()=>{LS.del("ld_remember");email="";rebuild()});
      wrap.appendChild(diffB);
    }
  }

  function submit(){
    err="";
    const e=email.trim().toLowerCase();
    if(!e||!pwd){err="Please fill in all fields.";rebuild();return}
    const users=LS.get("ld_users",{});
    if(!users[e]){err="No account found \u2014 please register first.";rebuild();return}
    if(users[e].hash!==hashPwd(pwd)){err="Incorrect password.";rebuild();return}
    LS.set("ld_session",e);LS.set("ld_remember",e);
    setState({session:e});
  }

  rebuild();
  return wrap;
}

// ── REGISTER PAGE ─────────────────────────────────────────────
function RegisterPage(){
  let step=1,email="",pwd="",pwd2="",nick="",code="",expCode="",err="",showPwd=false;
  const wrap=div({});

  function rebuild(){
    wrap.innerHTML="";
    const backB=btn({style:{background:"none",border:"none",color:"#888",fontSize:"13px",cursor:"pointer",marginBottom:"14px"}},
      ["\u2190 Back"]);
    backB.addEventListener("click",()=>{if(step===2)step=1;else setState({authPage:"login"});rebuild()});
    wrap.appendChild(backB);

    if(step===1){
      wrap.appendChild(h2_({style:{fontSize:"24px",marginBottom:"6px",color:"#1a1a2e"}},["Create account"]));
      wrap.appendChild(p_({style:{fontSize:"13px",color:"#888",marginBottom:"22px"}},["Use your Weizmann Institute email"]));
      const shakeDiv=div({className:err?"shake":""});
      const emailInp=inp({type:"email",value:email,placeholder:"you"+WZ,style:inpStyle(false,!!err)});
      emailInp.addEventListener("input",e=>{email=e.target.value;err="";rebuild()});

      nickInp.addEventListener("input",e=>nick=e.target.value);
      shakeDiv.appendChild(Field("Display Name",nickInp,{note:"Optional \u2014 leave blank to use your lab roster name"}));
      const pwdInp=inp({type:showPwd?"text":"password",value:pwd,style:{...inpStyle(),paddingRight:"44px"}});
      pwdInp.addEventListener("input",e=>{pwd=e.target.value;err=""});
      const eyeB=btn({style:{position:"absolute",right:"12px",top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:"16px",color:"#aaa",padding:"0"}},[showPwd?"\uD83D\uDE48":"\uD83D\uDC41\uFE0F"]);
      eyeB.addEventListener("click",e=>{e.preventDefault();showPwd=!showPwd;rebuild()});
      shakeDiv.appendChild(Field("Password",div({style:{position:"relative"}},[pwdInp,eyeB]),{note:"At least 6 characters"}));
      const pwd2Inp=inp({type:showPwd?"text":"password",value:pwd2,style:inpStyle()});
      pwd2Inp.addEventListener("input",e=>{pwd2=e.target.value;err=""});
      shakeDiv.appendChild(Field("Confirm Password",pwd2Inp));
      wrap.appendChild(shakeDiv);
      wrap.appendChild(Btn("Send Verification Code \u2192",goStep1,"teal",{full:true}));
      const loginB=btn({style:{background:"none",border:"none",color:"#888",fontSize:"13px",cursor:"pointer",display:"block",margin:"14px auto 0"}},["Already have an account? Sign in"]);
      loginB.addEventListener("click",()=>setState({authPage:"login"}));
      wrap.appendChild(loginB);
    } else {
      wrap.appendChild(h2_({style:{fontSize:"24px",marginBottom:"6px",color:"#1a1a2e"}},["Verify your email"]));
      const info=div({style:{background:"#E8F8F5",border:"1px solid #4ECDC4",borderRadius:"14px",padding:"16px 18px",marginBottom:"20px"}});
      info.appendChild(div({style:{fontSize:"13px",color:"#0d6c5c",fontWeight:"600",marginBottom:"4px"}},{},[]));
      info.children[0].textContent="\uD83D\uDCE7 Check your Weizmann Outlook";
      const infop=document.createElement("p");
      infop.style.cssText="font-size:12px;color:#0d6c5c";
      infop.innerHTML="Your mail client opened a pre-filled message. <strong>Click Send</strong> in Outlook to receive your code at <strong>"+email+"</strong>.";
      info.appendChild(infop);
      const reOpenB=btn({style:{marginTop:"8px",background:"none",border:"1px solid #4ECDC4",borderRadius:"8px",padding:"4px 12px",color:"#0d6c5c",fontSize:"12px",cursor:"pointer",fontWeight:"600"}},
        ["\u21BB Re-open email"]);
      reOpenB.addEventListener("click",()=>{
        const s=encodeURIComponent("LabDuties \u2013 Your verification code");
        const b=encodeURIComponent("Your LabDuties verification code is:\n\n"+expCode+"\n\nExpires in 15 minutes.");
        window.open("mailto:"+email+"?subject="+s+"&body="+b,"_blank");
      });
      info.appendChild(reOpenB);
      wrap.appendChild(info);
      const shakeDiv=div({className:err?"shake":""});
      const codeInp=inp({value:code,maxLength:"6",placeholder:"\u2022 \u2022 \u2022 \u2022 \u2022 \u2022",
        style:{...inpStyle(false,!!err),textAlign:"center",fontSize:"26px",letterSpacing:"0.3em",fontFamily:"monospace"}});
      codeInp.addEventListener("input",e=>{code=e.target.value;err="";rebuild()});
      codeInp.addEventListener("keydown",e=>{if(e.key==="Enter")goStep2()});
      shakeDiv.appendChild(Field("Enter your 6-digit code",codeInp,{error:err}));
      wrap.appendChild(shakeDiv);
      wrap.appendChild(Btn("Verify & Create Account \u2192",goStep2,"teal",{full:true}));
      wrap.appendChild(p_({style:{fontSize:"11px",color:"#aaa",textAlign:"center",marginTop:"8px"}},["Code expires in 15 minutes"]));
    }
  }

  function goStep1(){
    err="";
    const e=email.trim().toLowerCase();
    if(!e||!pwd||!pwd2){err="Please fill in all fields.";rebuild();return}
    if(!isWZ(e)){err="Email must end with "+WZ;rebuild();return}
    if(pwd.length<6){err="Password must be at least 6 characters.";rebuild();return}
    if(pwd!==pwd2){err="Passwords do not match.";rebuild();return}
    const people=LS.get("ld_people",BASE_PEOPLE);
    const invites=LS.get("ld_invites",[]);
    if(!people.find(p=>p.email===e)&&!invites.find(i=>i.email===e)){err="You need to be invited by a Manager first.";rebuild();return}
    const users=LS.get("ld_users",{});
    if(users[e]){err="An account already exists. Please sign in.";rebuild();return}
    const c=mkCode();
    const rec=LS.get("ld_recovery",{});rec[e]={code:c,exp:Date.now()+15*60*1000};LS.set("ld_recovery",rec);
    expCode=c;
    const sub=encodeURIComponent("LabDuties \u2013 Your verification code");
    const body=encodeURIComponent("Your LabDuties verification code is:\n\n"+c+"\n\nExpires in 15 minutes.");
    window.open("mailto:"+e+"?subject="+sub+"&body="+body,"_blank");
    step=2;rebuild();
  }
  function goStep2(){
    err="";
    const e=email.trim().toLowerCase();
    const rec=LS.get("ld_recovery",{});const r=rec[e];
    if(!r||r.code!==code.trim()||Date.now()>r.exp){err="Invalid or expired code.";rebuild();return}
    const users=LS.get("ld_users",{});users[e]={hash:hashPwd(pwd),registeredAt:new Date().toISOString()};LS.set("ld_users",users);
    if(nick.trim()){
      const pp=LS.get("ld_people",BASE_PEOPLE);
      LS.set("ld_people",pp.map(p=>p.email===e?{...p,nickname:nick.trim()}:p));
      STATE.people=LS.get("ld_people",BASE_PEOPLE);
    }
    delete rec[e];LS.set("ld_recovery",rec);
    LS.set("ld_session",e);LS.set("ld_remember",e);
    setState({session:e});
  }

  rebuild();return wrap;
}

// ── EVENT CARD ────────────────────────────────────────────────
function EventCard(item){
  const {task,key,aId}=item;
  const noMark=task.noMark;
  const st=noMark?"auto":statusOf(key);
  const SC={
    pending:{bg:"#FFF3CD",c:"#856404",dot:"#FFC107",label:"Pending"},
    completed:{bg:"#D1E7DD",c:"#0F5132",dot:"#198754",label:"Done"},
    cancelled:{bg:"#F0F0F0",c:"#6C757D",dot:"#ADB5BD",label:"Cancelled"},
    auto:{bg:"#E0F7FA",c:"#006064",dot:"#4ECDC4",label:"Ongoing"},
  };
  const sc=SC[st]||SC.pending;
  const person=STATE.people.find(p=>p.id===aId);
  const me=STATE.people.find(p=>p.email===STATE.session);
  const canDone=!noMark&&aId===me?.id&&st==="pending";
  const canCancel=!noMark&&isSched()&&st==="pending";

  const card=div({style:{background:"#fff",borderRadius:"14px",border:"1px solid #EBEBEB",marginBottom:"9px",overflow:"hidden",opacity:st==="cancelled"?"0.55":"1",boxShadow:"0 2px 10px rgba(0,0,0,.05)"}});
  card.appendChild(div({style:{height:"3px",background:noMark?"#4ECDC4":"#6366F1"}}));
  const inner=div({style:{padding:"12px 15px",display:"flex",gap:"12px"}});
  inner.appendChild(div({style:{width:"42px",height:"42px",borderRadius:"10px",background:"#F5F7FA",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"20px",flexShrink:"0"}},[task.emoji]));
  const info=div({style:{flex:"1",minWidth:"0"}});
  const topRow=div({style:{display:"flex",alignItems:"center",gap:"7px",flexWrap:"wrap"}});
  topRow.appendChild(span({style:{fontWeight:"700",fontSize:"14px"}},[task.title]));
  const badge=span({style:{background:sc.bg,color:sc.c,padding:"2px 8px",borderRadius:"99px",fontSize:"10px",fontWeight:"600",display:"inline-flex",alignItems:"center",gap:"3px"}});
  badge.appendChild(span({style:{width:"5px",height:"5px",borderRadius:"50%",background:sc.dot,display:"inline-block"}}));
  badge.appendChild(document.createTextNode(sc.label));
  topRow.appendChild(badge);
  info.appendChild(topRow);
  if(task.day_label)info.appendChild(div({style:{fontSize:"11px",color:"#bbb",marginTop:"2px"}},{},[["\uD83D\uDDD3 "+task.day_label]]));
  if(person){
    const pRow=div({style:{display:"flex",alignItems:"center",gap:"6px",marginTop:"5px"}});
    pRow.appendChild(Avatar(person,18));
    pRow.appendChild(span({style:{fontSize:"12px",color:"#666"}},[dname(person)]));
    info.appendChild(pRow);
  }
  if(noMark)info.appendChild(div({style:{fontSize:"11px",color:"#4ECDC4",marginTop:"4px"}},{},[["\u2713 No confirmation needed"]]));
  if(canDone||canCancel){
    const btnRow=div({style:{display:"flex",gap:"8px",marginTop:"9px",flexWrap:"wrap"}});
    if(canDone){
      const db=Btn("\u2713 Mark Done",()=>{
        const newAct={...STATE.actions,[key]:{status:"completed",by:STATE.session,at:new Date().toLocaleTimeString()}};
        setState({actions:newAct});toast3("\u2713 \""+task.title+"\" done!");
      },"teal",{sm:true});
      btnRow.appendChild(db);
    }
    if(canCancel){
      const cb=Btn("\u2715 Cancel",()=>{
        const newAct={...STATE.actions,[key]:{status:"cancelled",by:STATE.session}};
        setState({actions:newAct});toast3("Cancelled.");
      },"danger",{sm:true});
      btnRow.appendChild(cb);
    }
    info.appendChild(btnRow);
  }

// ── SCHEDULE PAGE ─────────────────────────────────────────────
function SchedulePage(){
  const sun=new Date(TODAY);sun.setDate(TODAY.getDate()-TODAY.getDay());
  const weekDays=[0,1,2,3,4].map(i=>{const d=new Date(sun);d.setDate(sun.getDate()+i);return d});
  const dayNames=["Sun","Mon","Tue","Wed","Thu"];
  const activePeople=STATE.people.filter(p=>STATE.tasks.some(t=>t.aId===p.id));

  function getCells(pid){
    const cells=[];let i=0;
    while(i<weekDays.length){
      const dn=dayNames[i];
      const tList=STATE.tasks.filter(t=>t.aId===pid&&t.days[dn]);
      const tKey=tList.map(t=>t.id).sort().join(",");
      let span=1;
      for(let j=i+1;j<weekDays.length;j++){
        const ndn=dayNames[j];
        const ntList=STATE.tasks.filter(t=>t.aId===pid&&t.days[ndn]);
        if(ntList.map(t=>t.id).sort().join(",")===tKey)span++;else break;
      }
      cells.push({tasks:tList,colSpan:span,date:weekDays[i]});
      i+=span;
    }
    return cells;
  }

  const page=div({className:"page"});
  page.appendChild(h1_({style:{fontSize:"24px",marginBottom:"4px"}},["Weekly Schedule"]));
  page.appendChild(p_({style:{color:"#888",fontSize:"12px",marginBottom:"14px"}},["Merged cells = same tasks across consecutive days"]));
  const tableWrap=div({style:{overflowX:"auto",borderRadius:"16px",boxShadow:"0 4px 20px rgba(0,0,0,.07)"}});
  const table=el("table",{style:{background:"#fff",borderRadius:"16px",overflow:"hidden",minWidth:"480px"}});
  const thead=el("thead");
  const headerRow=el("tr",{style:{background:"#1a1a2e",color:"#fff"}});
  headerRow.appendChild(el("th",{style:{padding:"10px 12px",textAlign:"left",fontSize:"10px",fontWeight:"700",textTransform:"uppercase",minWidth:"100px"}},["Person"]));
  weekDays.forEach((d,i)=>{
    const isToday=toStr(d)===toStr(TODAY);
    const th=el("th",{style:{padding:"10px 6px",textAlign:"center",fontSize:"10px",fontWeight:"700",background:isToday?"rgba(78,205,196,.25)":"transparent",borderLeft:"1px solid rgba(255,255,255,.08)",minWidth:"80px"}});
    th.appendChild(div({style:{color:isToday?"#4ECDC4":"rgba(255,255,255,.75)"}},[dayNames[i]]));
    th.appendChild(div({style:{fontSize:"9px",color:"rgba(255,255,255,.4)",marginTop:"1px"}},[d.getDate()+"/"+(d.getMonth()+1)]));
    headerRow.appendChild(th);
  });
  thead.appendChild(headerRow);table.appendChild(thead);
  const tbody=el("tbody");
  activePeople.forEach((person,pi)=>{
    const cells=getCells(person.id);
    const row=el("tr",{style:{borderTop:pi>0?"1px solid #F0F0F0":"none"}});
    const nameTd=el("td",{style:{padding:"8px 10px",background:"#FAFAFA",borderRight:"1px solid #F0F0F0"}});
    const nameInner=div({style:{display:"flex",alignItems:"center",gap:"8px"}});
    nameInner.appendChild(Avatar(person,26));
    nameInner.appendChild(span({style:{fontSize:"11px",fontWeight:"600",color:"#333",lineHeight:"1.2"}},[person.nick||person.full_name.split(" ")[0]]));
    nameTd.appendChild(nameInner);row.appendChild(nameTd);
    cells.forEach(cell=>{
      const isToday2=toStr(cell.date)===toStr(TODAY);
      const isMerged=cell.colSpan>1&&cell.tasks.length>0;
      const td=el("td",{colSpan:String(cell.colSpan),style:{padding:"6px 5px",borderLeft:"1px solid #F0F0F0",background:isMerged?"rgba(78,205,196,.06)":isToday2?"rgba(78,205,196,.04)":"#fff",textAlign:"center",verticalAlign:"middle"}});
      cell.tasks.forEach(t=>{
        const dk=t.id+"-"+toStr(cell.date);
        const done=statusOf(dk)==="completed";
        const chip=div({style:{fontSize:"9px",display:"inline-flex",alignItems:"center",gap:"2px",background:t.noMark?"#E0F7FA":done?"#F0F0F0":"#F5F7FA",borderRadius:"5px",padding:"3px 6px",margin:"2px",color:done||t.noMark?"#aaa":"#333",textDecoration:done?"line-through":"none",maxWidth:isMerged?"140px":"70px",overflow:"hidden",whiteSpace:"nowrap"}});
        chip.appendChild(span({},[t.emoji]));
        chip.appendChild(span({style:{overflow:"hidden",textOverflow:"ellipsis"}},[t.title]));
        if(t.noMark)chip.appendChild(span({style:{color:"#4ECDC4"}},{},[["\u25CF"]]));
        td.appendChild(chip);
      });
      row.appendChild(td);
    });
    tbody.appendChild(row);
  });
  table.appendChild(tbody);tableWrap.appendChild(table);page.appendChild(tableWrap);
  page.appendChild(p_({style:{fontSize:"11px",color:"#aaa",marginTop:"8px",textAlign:"center"}},{},[["\u25CF = No confirmation needed \u00B7 Merged = same tasks span multiple days"]]));
  return page;
}

  // Email log
  if(STATE.showLog){
    const overlay=div({className:"fade",style:{position:"fixed",inset:"0",background:"rgba(0,0,0,.5)",zIndex:"1000",display:"flex",alignItems:"flex-end"}});
    const sheet=div({style:{background:"#fff",borderRadius:"20px 20px 0 0",padding:"22px",width:"100%",maxHeight:"70vh",overflowY:"auto",boxShadow:"0 -8px 40px rgba(0,0,0,.2)"}});
    const headRow=div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px"}});
    headRow.appendChild(h3_({style:{fontSize:"19px"}},{},[["\uD83D\uDCEC Sent Email Log"]]));
    const closeB=btn({style:{background:"#eee",border:"none",borderRadius:"99px",width:"30px",height:"30px",cursor:"pointer"}},{},[["\u2715"]]);
    closeB.addEventListener("click",()=>setState({showLog:false}));
    headRow.appendChild(closeB);sheet.appendChild(headRow);
    if(STATE.emailLog.length===0){
      sheet.appendChild(p_({style:{color:"#999",fontSize:"13px"}},["No emails sent yet."]));
    } else {
      STATE.emailLog.forEach(e=>{
        const card=div({style:{border:"1px solid #EBEBEB",borderRadius:"12px",padding:"12px 14px",marginBottom:"9px"}});
        const eHead=div({style:{display:"flex",justifyContent:"space-between",marginBottom:"3px"}});
        eHead.appendChild(span({style:{fontWeight:"600",fontSize:"13px"}},[e.sub]));
        eHead.appendChild(span({style:{fontSize:"10px",color:"#aaa",marginLeft:"8px",flexShrink:"0"}},[e.at]));
        card.appendChild(eHead);
        card.appendChild(div({style:{fontSize:"11px",color:"#888"}},{},[["\uD83D\uDCE7 To: "+e.to]]));
        if(e.cc)card.appendChild(div({style:{fontSize:"11px",color:"#aaa"}},{},[["\u21B3 CC: "+e.cc]]));
        const body=div({style:{fontSize:"12px",color:"#555",marginTop:"5px",lineHeight:"1.6",whiteSpace:"pre-line",maxHeight:"80px",overflow:"auto"}});
        body.textContent=e.body;card.appendChild(body);sheet.appendChild(card);
      });
    }
    overlay.appendChild(sheet);frags.push(overlay);
    overlay.addEventListener("click",e=>{if(e.target===overlay)setState({showLog:false})});
  }

  return frags;
}

// ── RENDER ────────────────────────────────────────────────────
function render(){
  const app=document.getElementById("app");
  app.innerHTML="";

  if(!STATE.session){
    const pages={login:LoginPage,register:RegisterPage,forgot:ForgotPage};
    const PageFn=pages[STATE.authPage]||LoginPage;
    app.appendChild(AuthShell(PageFn()));
    return;
  }

  // Main app
  app.appendChild(TopBar());
  const content=div({style:{padding:"16px 13px 96px"}});
  const PAGES={dashboard:DashboardPage,schedule:SchedulePage,tasks:TasksPage,people:PeoplePage,settings:SettingsPage,profile:ProfilePage};
  const PageFn=PAGES[STATE.page]||DashboardPage;
  content.appendChild(PageFn());
  app.appendChild(content);
  app.appendChild(BottomNav());
  Modals().forEach(m=>app.appendChild(m));

  // Start/restart auto-reminder interval
  if(STATE.reminderInterval)clearInterval(STATE.reminderInterval);
  if(isSched()){
    STATE.reminderInterval=setInterval(()=>{
      if(!STATE.autoPrompt){
        const now=nowHHMM();const dk=toStr(TODAY);
        if(now===STATE.settings.time_day_of&&!LS.get("ld_s_dof_"+dk,false))setState({autoPrompt:{type:"day_of",label:"Day-of reminders"}});
        else if(now===STATE.settings.time_day_before&&!LS.get("ld_s_db_"+dk,false))setState({autoPrompt:{type:"day_before",label:"Day-before reminders"}});
        else{const thu=new Date(TODAY);thu.setDate(TODAY.getDate()+((4-TODAY.getDay()+7)%7));if(toStr(TODAY)===toStr(thu)&&now===STATE.settings.time_thursday&&!LS.get("ld_s_rep_"+dk,false))setState({autoPrompt:{type:"thursday",label:"Thursday report"}})}
      }
    },30000);
  }
}

// Boot
render();
</script>
</body>
</html>
