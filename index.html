const el=(tag,attrs={},children=[])=>{
  const e=document.createElement(tag);
  Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object"){Object.assign(e.style,v)}
    else if(k.startsWith("on")&&typeof v==="function"){e.addEventListener(k.slice(2).toLowerCase(),v)}
    else if(k==="className"){e.className=v}
    else if(k==="htmlFor"){e.htmlFor=v}
    else if(k==="checked"){e.checked=v}
    else if(k==="disabled"){e.disabled=v}
    else if(k==="value"&&(tag==="input"||tag==="select"||tag==="textarea")){e.value=v}
    else if(k==="readOnly"){e.readOnly=v}
    else if(k==="type"){e.type=v}
    else if(k==="placeholder"){e.placeholder=v}
    else if(k==="maxLength"){e.maxLength=v}
    else if(k==="colSpan"){e.colSpan=v}
    else if(k==="accept"){e.accept=v}
    else{e.setAttribute(k,v)}
  });
  children.forEach(c=>{
    if(c==null||c===false||c===undefined)return;
    if(typeof c==="string"||typeof c==="number"){e.appendChild(document.createTextNode(c))}
    else{e.appendChild(c)}
  });
  return e;
};

// ── ICS ───────────────────────────────────────────────────────
function makeICS(events){
  const p=n=>String(n).padStart(2,"0");
  const dt=(d,h)=>`${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}T${p(h)}0000`;
  let s="BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//LabDuties//EN\r\nCALSCALE:GREGORIAN\r\nMETHOD:PUBLISH\r\n";
  events.forEach(ev=>{
    s+="BEGIN:VEVENT\r\n";
    s+="UID:"+ev.uid+"\r\n";
    s+="DTSTART:"+dt(ev.date,10)+"\r\n";
    s+="DTEND:"+dt(ev.date,11)+"\r\n";
    s+="SUMMARY:"+ev.title+"\r\n";
    s+="BEGIN:VALARM\r\nTRIGGER:-PT60M\r\nACTION:DISPLAY\r\nDESCRIPTION:Reminder: "+ev.title+"\r\nEND:VALARM\r\n";
    s+="END:VEVENT\r\n";
  });
  s+="END:VCALENDAR";
  return s;
}
function dlFile(name,content,type){
  const b=new Blob([content],{type});
  const u=URL.createObjectURL(b);
  const a=document.createElement("a");a.href=u;a.download=name;a.click();

}

function openMail(to,cc,sub,body){
  const ccPart=cc&&cc.length?"cc="+encodeURIComponent(cc.join(","))+"&":"";
  window.open("mailto:"+encodeURIComponent(to)+"?"+ccPart+"subject="+encodeURIComponent(sub)+"&body="+encodeURIComponent(body),"_blank");
  const newLog=[{id:Date.now(),to,cc:(cc||[]).join(", "),sub,body,at:new Date().toLocaleTimeString("en-IL")},...STATE.emailLog];
  setState({emailLog:newLog});
}

// ── EMAILJS AUTO-SEND ─────────────────────────────────────────
// One-time setup at https://www.emailjs.com (free plan: 200 emails/month):
//   1. Create account → Add Email Service (connect your Outlook/Gmail)
//   2. Create Email Template with variables: {{to_email}}, {{to_name}}, {{subject}}, {{message}}
//   3. Paste your keys below (Settings page also lets you change them at runtime)
const EMAILJS_DEFAULTS={
  publicKey:  LS.get("ld_ejs_pub",""),    // Account → API Keys
  serviceId:  LS.get("ld_ejs_svc",""),    // Email Services → Service ID
  templateId: LS.get("ld_ejs_tpl",""),    // Email Templates → Template ID
};

function ejsReady(){
  const k=EMAILJS_DEFAULTS;
  return k.publicKey&&k.serviceId&&k.templateId;
}

async function autoSendEmail(to,toName,subject,message){
  if(!ejsReady()){
    // Fall back to mailto if not configured
    openMail(to,[],subject,message);
    return{ok:false,fallback:true};
  }
  try{
    emailjs.init({publicKey:EMAILJS_DEFAULTS.publicKey});
    await emailjs.send(EMAILJS_DEFAULTS.serviceId,EMAILJS_DEFAULTS.templateId,{
      to_email:to,
      to_name:toName||to,
      subject,
      message,
    });
    const newLog=[{id:Date.now(),to,cc:"",sub:subject,body:message,at:new Date().toLocaleTimeString("en-IL"),auto:true},...STATE.emailLog];
    setState({emailLog:newLog});
    return{ok:true};
  }catch(err){
    console.error("EmailJS error:",err);
    return{ok:false,err};
  }
}

async function autoSendBulk(recipients,subject,bodyFn){
  // recipients = [{email, name}]
  if(!ejsReady()){
    // Fallback: open one mailto with all recipients
    const to=recipients.map(r=>r.email).join(",");
    openMail(to,[],subject,bodyFn(recipients[0]||{}));
    return{ok:false,fallback:true,count:0};
  }
  emailjs.init({publicKey:EMAILJS_DEFAULTS.publicKey});
  let ok=0,fail=0;
  for(const r of recipients){
    try{
      await emailjs.send(EMAILJS_DEFAULTS.serviceId,EMAILJS_DEFAULTS.templateId,{
        to_email:r.email,
        to_name:r.name||r.email,
        subject,
        message:bodyFn(r),
      });
      ok++;
    }catch(e){fail++;console.error("EmailJS bulk error:",r.email,e);}
  }
  const newLog=recipients.map(r=>({id:Date.now()+Math.random(),to:r.email,cc:"",sub:subject,body:bodyFn(r),at:new Date().toLocaleTimeString("en-IL"),auto:true}));
  setState({emailLog:[...newLog,...STATE.emailLog]});
  return{ok,fail};
}

// ── DUTIES ────────────────────────────────────────────────────
function getDuties(d,pid){
  const dn=WDAYS[d.getDay()];if(!WORK.has(dn))return[];
  return STATE.tasks.filter(t=>t.days[dn]&&(pid!==undefined?t.aId===pid:true))
    .map(t=>({task:t,key:`${t.id}-${toStr(d)}`,aId:t.aId,date:d}));
}
const statusOf=key=>STATE.actions[key]?.status||"pending";

async function sendReminders(targetDate){
  const date=targetDate||TODAY;
  const duties=getDuties(date).filter(x=>!x.task.noMark&&statusOf(x.key)==="pending");
  if(!duties.length){toast3("No pending tasks for that day");return}
  const byP={};
  duties.forEach(d=>{
    const p=STATE.people.find(pp=>pp.id===d.aId);if(!p)return;
    if(!byP[p.id])byP[p.id]={person:p,tasks:[]};
    byP[p.id].tasks.push(d.task);
  });

// ── OUTLOOK CALENDAR (MSAL + GRAPH API) ──────────────────────
// SETUP REQUIRED — one-time Azure AD app registration:
//   1. Go to https://portal.azure.com → Azure Active Directory → App Registrations → + New
//   2. Name it "LabDuties", set "Single-page application" redirect URI = this page's URL
//   3. Under API Permissions → Add → Microsoft Graph → Delegated → Calendars.ReadWrite
//   4. Copy the "Application (client) ID" and paste it below
const OUTLOOK_CLIENT_ID = "58690dee-81fd-4202-af8f-efbf03f93b04";

let _msalApp = null;
function getMsalApp() {
  if (!_msalApp) {
    _msalApp = new msal.PublicClientApplication({
      auth: {
        clientId: OUTLOOK_CLIENT_ID,
        authority: "https://login.microsoftonline.com/common",
        redirectUri: location.href.split("?")[0].split("#")[0]
      },
      cache: { cacheLocation: "sessionStorage" }
    });
  }
  return _msalApp;
}

async function scheduleWeeklyReminders() {
  const me = STATE.people.find(p => p.email === STATE.session);
  if (!me) { toast3("Not logged in"); return; }

  // Collect tasks for next Sun–Thu
  const sun = nextSun();
  const dayNames = ["Sun","Mon","Tue","Wed","Thu"];
  const events = [];
  for (let i = 0; i < 5; i++) {
    const d = new Date(sun); d.setDate(sun.getDate() + i);
    const dn = dayNames[i];
    STATE.tasks.filter(t => t.aId === me.id && t.days[dn]).forEach(t => {
      events.push({ task: t, date: new Date(d) });
    });
  }
  if (!events.length) { toast3("No tasks for you next week 🎉"); return; }

  // Authenticate with Microsoft
  let token;
  try {
    const app = getMsalApp();
    let account = app.getAllAccounts()[0];
    if (!account) {
      const res = await app.loginPopup({ scopes: ["Calendars.ReadWrite"] });
      account = res.account;
    }
    const res = await app.acquireTokenSilent({ scopes: ["Calendars.ReadWrite"], account })
      .catch(() => app.acquireTokenPopup({ scopes: ["Calendars.ReadWrite"], account }));
    token = res.accessToken;
  } catch (err) {
    toast3("Sign-in cancelled or failed");
    console.error("MSAL error:", err);
    return;
  }

  // Create one Outlook calendar event per task
  toast3("⏳ Creating " + events.length + " calendar events…");
  let ok = 0, fail = 0;
  for (const ev of events) {
    const pad = n => String(n).padStart(2, "0");
    const y = ev.date.getFullYear();
    const mo = pad(ev.date.getMonth() + 1);
    const dy = pad(ev.date.getDate());
    const startDT = `${y}-${mo}-${dy}T09:30:00`;
    const endDT   = `${y}-${mo}-${dy}T10:00:00`;
    try {
      const r = await fetch("https://graph.microsoft.com/v1.0/me/events", {
        method: "POST",
        headers: {
          "Authorization": "Bearer " + token,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          subject: ev.task.emoji + " " + ev.task.title,
          start: { dateTime: startDT, timeZone: "Asia/Jerusalem" },
          end:   { dateTime: endDT,   timeZone: "Asia/Jerusalem" },
          body:  { contentType: "text", content: "LabDuties — NRR Lab\nTask: " + ev.task.title + "\nAssigned to: " + dname(me) },
          showAs: "busy",
          isReminderOn: true,
          reminderMinutesBeforeStart: 60
        })
      });
      if (r.ok) ok++; else { fail++; console.error("Graph error", r.status, await r.text()); }
    } catch (err) {
      fail++;
      console.error("Fetch error:", err);
    }
  }
  if (fail === 0) toast3("✅ " + ok + " events added to your Outlook!");
  else toast3(ok + " created, " + fail + " failed — check console");
}

    if(!isWZ(e)){showErr("Email must end with "+WZ);return}
    if(pwd.length<6){showErr("Password must be at least 6 characters.");return}
    if(pwd!==pwd2){showErr("Passwords do not match.");return}
    const people=LS.get("ld_people",BASE_PEOPLE);
    const invites=LS.get("ld_invites",[]);
    if(!people.find(p=>p.email===e)&&!invites.find(i=>i.email===e)){showErr("You need to be invited by a Manager first.");return}
    const users=LS.get("ld_users",{});
    if(users[e]){showErr("An account already exists for this email. Please sign in.");return}
    const c=mkCode();
    const rec=LS.get("ld_recovery",{});rec[e]={code:c,exp:Date.now()+15*60*1000};LS.set("ld_recovery",rec);
    expCode=c;
    const sub=encodeURIComponent("LabDuties \u2013 Your verification code");
    const body=encodeURIComponent("Your LabDuties verification code is:\n\n"+c+"\n\nExpires in 15 minutes.");
    try{window.open("mailto:"+e+"?subject="+sub+"&body="+body,"_blank")}catch(ex){}
    step=2;buildStep2();
  }
  function goStep2(showErr){
    const e=email.trim().toLowerCase();
    const rec=LS.get("ld_recovery",{});const r=rec[e];
    if(!r||r.code!==code.trim()||Date.now()>r.exp){showErr("Invalid or expired code. Check the code shown above.");return}
    const users=LS.get("ld_users",{});users[e]={hash:hashPwd(pwd),registeredAt:new Date().toISOString()};LS.set("ld_users",users);
    if(nick.trim()){
      const pp=LS.get("ld_people",BASE_PEOPLE);
      LS.set("ld_people",pp.map(p=>p.email===e?{...p,nickname:nick.trim()}:p));
      STATE.people=LS.get("ld_people",BASE_PEOPLE);
    }
    delete rec[e];LS.set("ld_recovery",rec);
    LS.set("ld_session",e);LS.set("ld_remember",e);
    setState({session:e});
  }

  buildStep1();return wrap;
}

// ── EVENT CARD ────────────────────────────────────────────────
function EventCard(item){
  const {task,key,aId}=item;
  const noMark=task.noMark;
  const st=noMark?"auto":statusOf(key);
  const SC={
    pending:{bg:"#FFF3CD",c:"#856404",dot:"#FFC107",label:"Pending"},
    completed:{bg:"#D1E7DD",c:"#0F5132",dot:"#198754",label:"Done"},
    cancelled:{bg:"#F0F0F0",c:"#6C757D",dot:"#ADB5BD",label:"Cancelled"},
    auto:{bg:"#E0F7FA",c:"#006064",dot:"#4ECDC4",label:"Ongoing"},
  };
  const sc=SC[st]||SC.pending;
  const person=STATE.people.find(p=>p.id===aId);
  const me=STATE.people.find(p=>p.email===STATE.session);
  const canDone=!noMark&&aId===me?.id&&st==="pending";
  const canCancel=!noMark&&isSched()&&st==="pending";

  const card=div({style:{background:"#fff",borderRadius:"14px",border:"1px solid #EBEBEB",marginBottom:"9px",overflow:"hidden",opacity:st==="cancelled"?"0.55":"1",boxShadow:"0 2px 10px rgba(0,0,0,.05)"}});
  card.appendChild(div({style:{height:"3px",background:noMark?"#4ECDC4":"#6366F1"}}));
  const inner=div({style:{padding:"12px 15px",display:"flex",gap:"12px"}});
  inner.appendChild(div({style:{width:"42px",height:"42px",borderRadius:"10px",background:"#F5F7FA",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"20px",flexShrink:"0"}},[task.emoji]));
  const info=div({style:{flex:"1",minWidth:"0"}});
  const topRow=div({style:{display:"flex",alignItems:"center",gap:"7px",flexWrap:"wrap"}});
  topRow.appendChild(span({style:{fontWeight:"700",fontSize:"14px"}},[task.title]));
  const badge=span({style:{background:sc.bg,color:sc.c,padding:"2px 8px",borderRadius:"99px",fontSize:"10px",fontWeight:"600",display:"inline-flex",alignItems:"center",gap:"3px"}});
  badge.appendChild(span({style:{width:"5px",height:"5px",borderRadius:"50%",background:sc.dot,display:"inline-block"}}));
  badge.appendChild(document.createTextNode(sc.label));
  topRow.appendChild(badge);
  info.appendChild(topRow);
  if(task.day_label)info.appendChild(div({style:{fontSize:"11px",color:"#bbb",marginTop:"2px"}},["\uD83D\uDDD3 "+task.day_label]));
  if(person){
    const pRow=div({style:{display:"flex",alignItems:"center",gap:"6px",marginTop:"5px"}});
    pRow.appendChild(Avatar(person,18));
    pRow.appendChild(span({style:{fontSize:"12px",color:"#666"}},[dname(person)]));
    info.appendChild(pRow);
  }
  if(noMark)info.appendChild(div({style:{fontSize:"11px",color:"#4ECDC4",marginTop:"4px"}},["\u2713 No confirmation needed"]));
  if(canDone||canCancel){
    const btnRow=div({style:{display:"flex",gap:"8px",marginTop:"9px",flexWrap:"wrap"}});
    if(canDone){
      const db=Btn("\u2713 Mark Done",()=>{
        const newAct={...STATE.actions,[key]:{status:"completed",by:STATE.session,at:new Date().toLocaleTimeString()}};
        setState({actions:newAct});toast3("\u2713 \""+task.title+"\" done!");
      },"teal",{sm:true});
      btnRow.appendChild(db);
    }
    if(canCancel){
      const cb=Btn("\u2715 Cancel",()=>{
        const newAct={...STATE.actions,[key]:{status:"cancelled",by:STATE.session}};
        setState({actions:newAct});toast3("Cancelled.");
      },"danger",{sm:true});
      btnRow.appendChild(cb);
    }
    info.appendChild(btnRow);
  }
  if(st==="completed")info.appendChild(div({style:{fontSize:"11px",color:"#198754",marginTop:"4px"}},["\u2713 Done at "+(STATE.actions[key]?.at||"")]));
  inner.appendChild(info);card.appendChild(inner);
  return card;
}

// ── SCHEDULE PAGE ─────────────────────────────────────────────
function SchedulePage(){
  const sun=new Date(TODAY);sun.setDate(TODAY.getDate()-TODAY.getDay());
  const weekDays=[0,1,2,3,4].map(i=>{const d=new Date(sun);d.setDate(sun.getDate()+i);return d});
  const dayNames=["Sun","Mon","Tue","Wed","Thu"];
  const activePeople=STATE.people.filter(p=>STATE.tasks.some(t=>t.aId===p.id));

  function getCells(pid){
    const cells=[];let i=0;
    while(i<weekDays.length){
      const dn=dayNames[i];
      const tList=STATE.tasks.filter(t=>t.aId===pid&&t.days[dn]);
      const tKey=tList.map(t=>t.id).sort().join(",");
      let span=1;
      for(let j=i+1;j<weekDays.length;j++){
        const ndn=dayNames[j];
        const ntList=STATE.tasks.filter(t=>t.aId===pid&&t.days[ndn]);
        if(ntList.map(t=>t.id).sort().join(",")===tKey)span++;else break;
      }
      cells.push({tasks:tList,colSpan:span,date:weekDays[i]});
      i+=span;
    }
    return cells;
  }

  const page=div({className:"page"});
  page.appendChild(h1_({style:{fontSize:"24px",marginBottom:"4px"}},["Weekly Schedule"]));
  page.appendChild(p_({style:{color:"#888",fontSize:"12px",marginBottom:"14px"}},["Merged cells = same tasks across consecutive days"]));
  const tableWrap=div({style:{overflowX:"auto",borderRadius:"16px",boxShadow:"0 4px 20px rgba(0,0,0,.07)"}});
  const table=el("table",{style:{background:"#fff",borderRadius:"16px",overflow:"hidden",minWidth:"480px"}});
  const thead=el("thead");
  const headerRow=el("tr",{style:{background:"#1a1a2e",color:"#fff"}});
  headerRow.appendChild(el("th",{style:{padding:"10px 12px",textAlign:"left",fontSize:"10px",fontWeight:"700",textTransform:"uppercase",minWidth:"100px"}},["Person"]));

        chip.appendChild(span({},[t.emoji]));

  table.appendChild(tbody);tableWrap.appendChild(table);page.appendChild(tableWrap);
  page.appendChild(p_({style:{fontSize:"11px",color:"#aaa",marginTop:"8px",textAlign:"center"}},["\u25CF = No confirmation needed \u00B7 Merged = same tasks span multiple days"]));

  // ── Schedule Weekly Reminders (Outlook Graph API) ──

  calSection.appendChild(calTitle);
  calSection.appendChild(p_({style:{fontSize:"12px",color:"#888",marginBottom:"12px"}},
    ["Automatically create Outlook calendar events for your tasks next week (Sun–Thu) at 09:30 AM."]));

  const calBtn = Btn("\uD83D\uDDD3 Schedule Weekly Reminders", async () => {
    calBtn.disabled = true;
    calBtn.textContent = "⏳ Connecting…";
    try { await scheduleWeeklyReminders(); }
    finally { calBtn.disabled = false; calBtn.textContent = "\uD83D\uDDD3 Schedule Weekly Reminders"; }
  }, "teal", {full:true});
  calSection.appendChild(calBtn);

  page.appendChild(calSection);

  return page;
}

// ── TASKS PAGE ────────────────────────────────────────────────
function TasksPage(){
  const EMOJIS=["\uD83D\uDCCC","\uD83E\uDE78","\uD83D\uDCA7","\uD83E\uDDA0","\uD83E\uDDF9","\uD83E\uDDEB","\uD83D\uDD2C","\u2697\uFE0F","\uD83E\uDDFC","\uD83E\uDDEA","\uD83D\uDEC1","\uD83E\uDDF4","\u2699\uFE0F","\u267B\uFE0F","\u2615","\uD83C\uDF00","\uD83D\uDCE6"];
  const DAYKEYS=["Sun","Mon","Tue","Wed","Thu"];
  const EMPTY={title:"",emoji:"\uD83D\uDCCC",days:{Sun:0,Mon:0,Tue:0,Wed:0,Thu:0},aId:"",noMark:false};
  let showForm=false,editId=null,form={...EMPTY,days:{...EMPTY.days}},search="";
  const wrap=div({});

  function rebuild(){
    wrap.innerHTML="";
    const page=div({className:"page"});
    const topRow=div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px"}});
    topRow.appendChild(h1_({style:{fontSize:"24px"}},["\uD83D\uDCCB Tasks ",span({style:{fontSize:"14px",color:"#aaa"}},[" ("+STATE.tasks.length+")"])]));
    if(!showForm){
      const nb=Btn("+ New Task",()=>{editId=null;form={...EMPTY,days:{...EMPTY.days}};showForm=true;rebuild()},"dark");
      topRow.appendChild(nb);
    }
    page.appendChild(topRow);

    if(showForm){
      const formBox=div({style:{background:"#fff",borderRadius:"14px",padding:"20px",border:"1px solid #DDD",marginBottom:"18px",boxShadow:"0 4px 16px rgba(0,0,0,.08)"}});
      formBox.appendChild(h3_({style:{marginBottom:"16px"}},[editId?"Edit Task":"New Task"]));
      const titleInp=inp({value:form.title,placeholder:"Task name\u2026",style:inpStyle()});
      titleInp.addEventListener("input",e=>form.title=e.target.value);
      formBox.appendChild(Field("Title",titleInp));
      // Emoji picker
      const emojiWrap=div({style:{display:"flex",flexWrap:"wrap",gap:"6px"}});
      EMOJIS.forEach(e=>{
        const eb=btn({style:{width:"34px",height:"34px",border:"2px solid "+(form.emoji===e?"#4ECDC4":"#DDD"),borderRadius:"8px",background:form.emoji===e?"#E0F7FA":"#fff",cursor:"pointer",fontSize:"17px",padding:"0"}},[e]);
        eb.addEventListener("click",ev=>{ev.preventDefault();form.emoji=e;rebuild()});
        emojiWrap.appendChild(eb);
      });
      formBox.appendChild(Field("Emoji",emojiWrap));
      // Days
      const daysWrap=div({style:{display:"flex",gap:"8px",flexWrap:"wrap"}});
      DAYKEYS.forEach(d=>{
        const db=btn({style:{padding:"6px 12px",borderRadius:"8px",border:"2px solid "+(form.days[d]?"#4ECDC4":"#DDD"),background:form.days[d]?"#E0F7FA":"#fff",fontWeight:"600",fontSize:"13px",cursor:"pointer",color:form.days[d]?"#006064":"#666"}},[d]);
        db.addEventListener("click",ev=>{ev.preventDefault();form.days[d]=form.days[d]?0:1;rebuild()});
        daysWrap.appendChild(db);
      });
      formBox.appendChild(Field("Days",daysWrap));
      // Assign
      const asgSel=sel({style:inpStyle()});
      asgSel.appendChild(opt("","\u2014 Unassigned \u2014",!form.aId));
      STATE.people.forEach(p=>asgSel.appendChild(opt(String(p.id),dname(p)+" ("+( ROLE_SHORT[p.role]||p.role)+")",String(form.aId)===String(p.id))));
      asgSel.addEventListener("change",e=>form.aId=e.target.value);
      formBox.appendChild(Field("Assign To",asgSel));
      // No mark
      const noMarkWrap=div({style:{display:"flex",alignItems:"center",gap:"10px",marginBottom:"16px",padding:"12px 14px",background:"#F0FFF8",border:"1px solid #A8E6CF",borderRadius:"10px"}});
      const nmCb=inp({type:"checkbox"});nmCb.checked=!!form.noMark;
      nmCb.addEventListener("change",e=>form.noMark=e.target.checked);
      noMarkWrap.appendChild(nmCb);
      const nmLbl=label_({style:{fontSize:"13px",fontWeight:"600",color:"#0d6c5c",cursor:"pointer"}},
        ["\u2713 No confirmation needed",span({style:{display:"block",fontSize:"11px",fontWeight:"400",color:"#2E7D52"}},["Task is ongoing \u2014 no \"Mark Done\" required"])]);
      noMarkWrap.appendChild(nmLbl);
      formBox.appendChild(noMarkWrap);
      // Buttons
      const btnRow=div({style:{display:"flex",gap:"8px"}});
      btnRow.appendChild(Btn(editId?"Save Changes":"Create Task",()=>{
        if(!form.title.trim()){toast3("Title required");return}
        if(!DAYKEYS.some(k=>form.days[k])){toast3("Select at least one day");return}
        const day_label=DAYKEYS.filter(k=>form.days[k]).join("/");
        const newTask={...form,day_label,aId:form.aId?+form.aId:null};
        if(editId){
          setState({tasks:STATE.tasks.map(t=>t.id===editId?{...t,...newTask}:t)});
          toast3("Task updated \u2713");editId=null;
        } else {
          const newId=Math.max(0,...STATE.tasks.map(t=>t.id))+1;
          setState({tasks:[...STATE.tasks,{id:newId,...newTask}]});
          toast3("Task created \u2713");
        }
        form={...EMPTY,days:{...EMPTY.days}};showForm=false;rebuild();
      },"teal"));
      btnRow.appendChild(Btn("Cancel",()=>{showForm=false;editId=null;rebuild()},"ghost"));
      formBox.appendChild(btnRow);
      page.appendChild(formBox);
    }

    // Search
    const searchInp=inp({value:search,placeholder:"\uD83D\uDD0D Search tasks\u2026",style:inpStyle()});
    searchInp.addEventListener("input",e=>{search=e.target.value;rebuild()});
    page.appendChild(div({style:{marginBottom:"14px"}},[searchInp]));

    const filtered=STATE.tasks.filter(t=>t.title.toLowerCase().includes(search.toLowerCase()));
    filtered.forEach(task=>{
      const asgn=STATE.people.find(p=>p.id===task.aId);
      const card=div({style:{background:"#fff",borderRadius:"14px",padding:"13px 16px",border:"1px solid #EBEBEB",marginBottom:"9px",boxShadow:"0 2px 8px rgba(0,0,0,.04)"}});
      const row=div({style:{display:"flex",alignItems:"center",gap:"12px"}});
      row.appendChild(div({style:{width:"42px",height:"42px",borderRadius:"10px",background:"#F5F7FA",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"20px",flexShrink:"0"}},[task.emoji]));
      const info=div({style:{flex:"1",minWidth:"0"}});
      const titleRow=div({style:{display:"flex",alignItems:"center",gap:"6px",flexWrap:"wrap"}});
      titleRow.appendChild(span({style:{fontWeight:"700",fontSize:"14px"}},[task.title]));
      if(task.noMark)titleRow.appendChild(span({style:{fontSize:"10px",background:"#E0F7FA",color:"#006064",padding:"1px 7px",borderRadius:"99px",fontWeight:"700"}},["\u25CF Ongoing"]));
      info.appendChild(titleRow);
      info.appendChild(div({style:{fontSize:"11px",color:"#aaa",marginTop:"2px"}},["\uD83D\uDDD3 "+(task.day_label||"\u2014")]));
      const assignRow=div({style:{display:"flex",alignItems:"center",gap:"6px",marginTop:"5px"}});
      if(asgn){assignRow.appendChild(Avatar(asgn,18));assignRow.appendChild(span({style:{fontSize:"12px",color:"#666"}},[dname(asgn)]))}
      else assignRow.appendChild(span({style:{fontSize:"12px",color:"#dc3545"}},["\u26A0 Unassigned"]));
      info.appendChild(assignRow);
      row.appendChild(info);
      if(isSched()){
        const actRow=div({style:{display:"flex",gap:"6px",flexShrink:"0"}});
        actRow.appendChild(Btn("\u270F\uFE0F",()=>{editId=task.id;form={title:task.title,emoji:task.emoji,days:{...task.days},aId:task.aId||"",noMark:!!task.noMark};showForm=true;rebuild()},"ghost",{sm:true}));
        actRow.appendChild(Btn("\uD83D\uDDD1",()=>{setState({tasks:STATE.tasks.filter(t=>t.id!==task.id)});toast3("Deleted.")},"danger",{sm:true}));
        row.appendChild(actRow);
      }
      card.appendChild(row);page.appendChild(card);
    });
    if(filtered.length===0)page.appendChild(p_({style:{color:"#999",fontSize:"14px",textAlign:"center",padding:"20px 0"}},["No tasks found"]));
    wrap.appendChild(page);
  }
  rebuild();return wrap;
}

// ── PEOPLE PAGE ───────────────────────────────────────────────
function PeoplePage(){
  let editId=null,showInv=false,invEmail="",invErr="";
  const wrap=div({});

  function roleOpts(targetRole){
    if(isPI()){
      if(targetRole==="Manager")return[{label:"\u2193 Scheduler",role:"Authorized Scheduler"}];
      if(targetRole==="Authorized Scheduler")return[{label:"\u2191 Manager",role:"Manager"},{label:"\u2193 Member",role:"Member"}];
      if(targetRole==="Member")return[{label:"\u2191 Scheduler",role:"Authorized Scheduler"}];
    }
    if(getMyRole()==="Manager"){
      if(targetRole==="Authorized Scheduler")return[{label:"\u2191 Manager",role:"Manager"},{label:"\u2193 Member",role:"Member"}];
      if(targetRole==="Member")return[{label:"\u2191 Scheduler",role:"Authorized Scheduler"}];
    }
    return[];
  }

  function rebuild(){
    wrap.innerHTML="";
    const page=div({className:"page"});
    const topRow=div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"18px"}});
    topRow.appendChild(h1_({style:{fontSize:"24px"}},["People ",span({style:{fontSize:"14px",color:"#aaa"}},[" ("+STATE.people.length+")"])]));
    if(isMgr()){
      topRow.appendChild(Btn("\u2709 Invite",()=>{showInv=!showInv;rebuild()},"purple"));
    }
    page.appendChild(topRow);

    if(isMgr()&&showInv){
      const invBox=div({style:{background:"#fff",borderRadius:"14px",padding:"20px",border:"1px solid #DDD",marginBottom:"16px",boxShadow:"0 4px 16px rgba(0,0,0,.08)"}});
      invBox.appendChild(h3_({style:{marginBottom:"6px"}},["Invite New Member"]));
      const ep=document.createElement("p");ep.style.cssText="font-size:12px;color:#888;margin-bottom:12px";
      ep.innerHTML="Must be a <strong>@weizmann.ac.il</strong> address.";
      invBox.appendChild(ep);
      const emailInp=inp({value:invEmail,placeholder:"name"+WZ,style:inpStyle(false,!!invErr)});
      emailInp.addEventListener("input",e=>{invEmail=e.target.value;invErr=""});
      invBox.appendChild(Field("Email",emailInp,{error:invErr}));
      const btnRow=div({style:{display:"flex",gap:"8px"}});
      btnRow.appendChild(Btn("Send Invite",()=>{
        invErr="";const e=invEmail.trim().toLowerCase();
        if(!e){invErr="Enter an email.";rebuild();return}
        if(!isWZ(e)){invErr="Must end with "+WZ;rebuild();return}
        if(STATE.people.find(p=>p.email===e)){invErr="Already in the system.";rebuild();return}
        if(STATE.invites.find(i=>i.email===e)){invErr="Already invited.";rebuild();return}
        setState({invites:[...STATE.invites,{id:Date.now(),email:e,at:new Date().toLocaleTimeString("en-IL")}]});
        openMail(e,[],"🔬 Invited to LabDuties","Hi!\n\nYou're invited to LabDuties — NRR Lab.\n\n1. Open LabDuties\n2. Click \"Register\"\n3. Use this email: "+e+"\n\nSee you in the lab!\n\nNRR LabDuties");
        invEmail="";showInv=false;toast3("Invite sent \u2713");rebuild();
      },"purple",{disabled:!isWZ(invEmail)}));
      btnRow.appendChild(Btn("Cancel",()=>{showInv=false;invErr="";rebuild()},"ghost"));
      invBox.appendChild(btnRow);page.appendChild(invBox);
    }

    if(isMgr()&&STATE.invites.length>0){
      const pendBox=div({style:{background:"#FFF9E6",border:"1px solid #FFE066",borderRadius:"12px",padding:"12px 16px",marginBottom:"14px"}});
      pendBox.appendChild(div({style:{fontSize:"12px",fontWeight:"700",color:"#856404",marginBottom:"8px"}},["\u23F3 Pending Invites"]));
      STATE.invites.forEach(inv=>{
        const row=div({style:{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid rgba(255,224,96,.3)"}});
        row.appendChild(span({style:{fontSize:"13px"}},[inv.email]));
        const xb=btn({style:{background:"none",border:"none",color:"#dc3545",cursor:"pointer",fontSize:"12px"}},["\u2715"]);
        xb.addEventListener("click",()=>setState({invites:STATE.invites.filter(i=>i.id!==inv.id)}));
        row.appendChild(xb);pendBox.appendChild(row);
      });
      page.appendChild(pendBox);
    }

    if(!isMgr()){
      page.appendChild(div({style:{background:"#F0F4FF",border:"1px solid #C7D7F5",borderRadius:"10px",padding:"10px 14px",marginBottom:"14px",fontSize:"12px",color:"#3B5998"}},
        ["\u2139\uFE0F Only Managers and above can invite or change roles."]));
    }

    STATE.people.forEach(p=>{
      const tLvl=ROLE_LVL[p.role]||1;
      const opts=editId===p.id?roleOpts(p.role):[];
      const canEdit=isMgr()&&p.email!==STATE.session&&(isPI()?tLvl<4:tLvl<3)&&roleOpts(p.role).length>0;
      const canDel=p.email===STATE.session||(getMyLvl()>=3&&tLvl<getMyLvl());
      const card=div({style:{background:"#fff",borderRadius:"14px",padding:"13px 16px",border:"1px solid #EBEBEB",marginBottom:"9px",boxShadow:"0 2px 8px rgba(0,0,0,.04)"}});
      const row=div({style:{display:"flex",alignItems:"center",gap:"12px"}});
      row.appendChild(Avatar(p,44));
      const info=div({style:{flex:"1",minWidth:"0"}});
      info.appendChild(div({style:{fontWeight:"700",fontSize:"14px"}},[dname(p)]));
      info.appendChild(div({style:{fontSize:"11px",color:"#888",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},[p.email]));
      row.appendChild(info);
      const actions=div({style:{display:"flex",gap:"6px",alignItems:"center",flexShrink:"0",flexWrap:"wrap",justifyContent:"flex-end"}});
      actions.appendChild(RoleBadge(p.role));
      if(canEdit){
        if(editId===p.id){
          opts.forEach(o=>{
            actions.appendChild(Btn(o.label,()=>{
              setState({people:STATE.people.map(pp=>pp.id===p.id?{...pp,role:o.role}:pp)});
              toast3("Role updated \u2713");editId=null;rebuild();
            },"yellow",{sm:true}));
          });
          actions.appendChild(Btn("\u2715",()=>{editId=null;rebuild()},"ghost",{sm:true}));
        } else {
          actions.appendChild(Btn("Role \u2195",()=>{editId=p.id;rebuild()},"ghost",{sm:true}));
        }
      }
      if(canDel){
        actions.appendChild(Btn("\uD83D\uDDD1",()=>setState({confirmDel:{email:p.email,name:dname(p)}}),"danger",{sm:true}));
      }
      row.appendChild(actions);card.appendChild(row);page.appendChild(card);
    });
    wrap.appendChild(page);
  }
  rebuild();return wrap;
}

      },"teal"));
    } else {
      box.appendChild(p_({style:{fontSize:"12px",color:"#aaa"}},["Only Managers and above can save changes."]));
    }
    page.appendChild(box);wrap.appendChild(page);
  }
  rebuild();return wrap;
}

// ── PROFILE PAGE ──────────────────────────────────────────────
function ProfilePage(){
  const me=STATE.people.find(p=>p.email===STATE.session)||{};
  let form={nickname:me.nickname||"",gender:me.gender||"Prefer not to say"};
  let showPwd=false,cpwd="",npwd="",npwd2="",pwdErr="";
  let showPick=false,pickTab="lab",pickErrs={};
  const wrap=div({});

  function rebuild(){
    wrap.innerHTML="";
    const page=div({className:"page"});
    page.appendChild(h1_({style:{fontSize:"24px",marginBottom:"18px"}},["My Profile"]));
    const box=div({style:{background:"#fff",borderRadius:"16px",padding:"22px",border:"1px solid #EBEBEB",boxShadow:"0 2px 8px rgba(0,0,0,.05)"}});

    // Avatar section
    const avSec=div({style:{display:"flex",flexDirection:"column",alignItems:"center",marginBottom:"22px",paddingBottom:"20px",borderBottom:"1px solid #F0F0F0"}});
    const avPos=div({style:{position:"relative",marginBottom:"14px"}});
    avPos.appendChild(Avatar(me,88));
    const editAvB=btn({style:{position:"absolute",bottom:"0",right:"0",width:"28px",height:"28px",borderRadius:"50%",background:"#1a1a2e",border:"2px solid #fff",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"13px"}},["\u270F\uFE0F"]);
    editAvB.addEventListener("click",()=>{showPick=true;rebuild()});
    avPos.appendChild(editAvB);avSec.appendChild(avPos);
    const nameDiv=div({style:{textAlign:"center"}});
    const g=galLookup(STATE.session);
    nameDiv.appendChild(div({style:{fontSize:"20px",fontWeight:"700"}},[(g.title?g.title+" ":"")+(me.full_name||"")]));
    if(me.nickname&&me.nickname!==me.full_name)nameDiv.appendChild(div({style:{fontSize:"13px",color:"#888",marginTop:"2px"}},['"'+me.nickname+'"']));
    nameDiv.appendChild(div({style:{color:"#aaa",fontSize:"12px",marginTop:"3px"}},[STATE.session]));
    nameDiv.appendChild(div({style:{marginTop:"6px"}},[RoleBadge(me.role||"Member")]));
    avSec.appendChild(nameDiv);
    const labMatch=GALLERY.find(g2=>g2.email===STATE.session);
    if(labMatch&&me.photo!==labMatch.photo){
      const suggest=div({style:{marginTop:"14px",background:"#F0FFF8",border:"1px solid #A8E6CF",borderRadius:"12px",padding:"12px 16px",width:"100%"}});
      suggest.appendChild(p_({style:{fontSize:"12px",color:"#2E7D52",fontWeight:"600",textAlign:"center",marginBottom:"8px"}},["\uD83D\uDD2C Your lab website photo is available!"]));
      const sRow=div({style:{display:"flex",alignItems:"center",justifyContent:"center",gap:"12px"}});
      const labAvWrap=div({style:{width:"42px",height:"42px",borderRadius:"50%",overflow:"hidden",border:"2px solid #4ECDC4"}});
      labAvWrap.appendChild(img_({src:labMatch.photo,alt:"",style:{width:"100%",height:"100%",objectFit:"cover"}}));
      sRow.appendChild(labAvWrap);
      sRow.appendChild(Btn("Use This Photo",()=>{
        const newP=STATE.people.map(pp=>pp.email===STATE.session?{...pp,photo:labMatch.photo}:pp);
        setState({people:newP});toast3("Photo updated \u2713");
      },"teal",{sm:true}));
      suggest.appendChild(sRow);avSec.appendChild(suggest);
    }
    const changePhotoB=btn({style:{marginTop:"10px",background:"none",border:"1px solid #DDD",color:"#555",padding:"6px 16px",borderRadius:"9px",fontSize:"12px",fontWeight:"600",cursor:"pointer"}},["\uD83D\uDDBC Change Photo"]);
    changePhotoB.addEventListener("click",()=>{showPick=true;rebuild()});
    avSec.appendChild(changePhotoB);
    box.appendChild(avSec);

    // Form fields
    const nickInp=inp({value:form.nickname,style:inpStyle()});
    nickInp.addEventListener("input",e=>form.nickname=e.target.value);
    box.appendChild(Field("Nickname",nickInp));
    const genderSel=sel({style:inpStyle()});
    ["Male","Female","Non-binary","Other","Prefer not to say"].forEach(g3=>genderSel.appendChild(opt(g3,g3,form.gender===g3)));
    genderSel.addEventListener("change",e=>form.gender=e.target.value);
    box.appendChild(Field("Gender Identity",genderSel));
    box.appendChild(div({style:{marginBottom:"20px"}},[Btn("Save Profile",()=>{
      const newP=STATE.people.map(pp=>pp.email===STATE.session?{...pp,nickname:form.nickname,gender:form.gender}:pp);
      setState({people:newP});toast3("Saved \u2713");
    },"teal")]));

    // Change password
    const pwdSec=div({style:{borderTop:"1px solid #F5F5F5",paddingTop:"18px"}});
    const pwdHead=div({style:{display:"flex",justifyContent:"space-between",alignItems:"center"}});
    pwdHead.appendChild(span({style:{fontWeight:"600",fontSize:"14px"}},["\uD83D\uDD11 Change Password"]));
    const togglePwdB=btn({style:{background:"none",border:"none",color:"#4ECDC4",fontSize:"13px",fontWeight:"600",cursor:"pointer"}},[showPwd?'Cancel':'Change']);
    togglePwdB.addEventListener("click",()=>{showPwd=!showPwd;rebuild()});
    pwdHead.appendChild(togglePwdB);pwdSec.appendChild(pwdHead);
    if(showPwd){
      const pwdForm=div({style:{marginTop:"14px"}});
      const cpwdI=inp({type:"password",value:cpwd,style:inpStyle(false,!!pwdErr)});cpwdI.addEventListener("input",e=>{cpwd=e.target.value;pwdErr=""});
      pwdForm.appendChild(Field("Current Password",cpwdI,{error:pwdErr}));
      const npwdI=inp({type:"password",value:npwd,style:inpStyle()});npwdI.addEventListener("input",e=>npwd=e.target.value);
      pwdForm.appendChild(Field("New Password",npwdI));
      const npwd2I=inp({type:"password",value:npwd2,style:inpStyle()});npwd2I.addEventListener("input",e=>npwd2=e.target.value);
      pwdForm.appendChild(Field("Confirm",npwd2I));
      pwdForm.appendChild(Btn("Update Password",()=>{
        pwdErr="";
        const users=LS.get("ld_users",{});
        if(users[STATE.session]?.hash!==hashPwd(cpwd)){pwdErr="Current password incorrect.";rebuild();return}
        if(npwd.length<6){pwdErr="Min 6 characters.";rebuild();return}
        if(npwd!==npwd2){pwdErr="Passwords don't match.";rebuild();return}
        users[STATE.session].hash=hashPwd(npwd);LS.set("ld_users",users);
        cpwd="";npwd="";npwd2="";showPwd=false;toast3("Password changed \u2713");rebuild();
      },"dark"));
      pwdSec.appendChild(pwdForm);
    }
    box.appendChild(pwdSec);

    // Calendar section
    const calSec=div({style:{borderTop:"1px solid #F5F5F5",paddingTop:"18px",marginTop:"18px"}});
    calSec.appendChild(div({style:{fontWeight:"600",fontSize:"14px",marginBottom:"8px"}},["\uD83D\uDCC5 Calendar"]));
    calSec.appendChild(p_({style:{fontSize:"12px",color:"#888",marginBottom:"10px"}},["Download your tasks as a .ics file and import into Outlook."]));
    calSec.appendChild(Btn("\uD83D\uDDD3\uFE0F Weekly Tasks for Outlook",downloadMyICS,"ghost"));
    box.appendChild(calSec);

    // Account actions
    const actSec=div({style:{borderTop:"1px solid #F5F5F5",paddingTop:"18px",marginTop:"18px",display:"flex",gap:"10px",flexWrap:"wrap"}});
    actSec.appendChild(Btn("\uD83D\uDD04 Switch User",()=>{LS.del("ld_session");setState({session:null,authPage:"login"})},"ghost"));
    actSec.appendChild(Btn("\uD83D\uDDD1 Delete My Account",()=>setState({confirmDel:{email:STATE.session,name:dname(me||{full_name:"your account",email:STATE.session})}}),"danger"));
    actSec.appendChild(Btn("Sign Out",()=>{LS.del("ld_session");setState({session:null,authPage:"login"})},"danger"));
    box.appendChild(actSec);
    page.appendChild(box);

    // Photo picker modal
    if(showPick){
      const overlay=div({className:"fade",style:{position:"fixed",inset:"0",background:"rgba(0,0,0,.65)",zIndex:"2000",display:"flex",alignItems:"center",justifyContent:"center",padding:"16px"}});
      const modal=div({style:{background:"#fff",borderRadius:"20px",width:"100%",maxWidth:"420px",maxHeight:"88vh",display:"flex",flexDirection:"column",overflow:"hidden",boxShadow:"0 24px 60px rgba(0,0,0,.35)"}});
      const mHead=div({style:{padding:"18px 20px 0",flexShrink:"0"}});
      const mHeadRow=div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}});
      mHeadRow.appendChild(h3_({style:{fontSize:"18px"}},["Choose Profile Photo"]));
      const closeB=btn({style:{background:"#eee",border:"none",borderRadius:"99px",width:"30px",height:"30px",cursor:"pointer",fontSize:"14px"}},["\u2715"]);
      closeB.addEventListener("click",()=>{showPick=false;rebuild()});
      mHeadRow.appendChild(closeB);mHead.appendChild(mHeadRow);
      const tabs=div({style:{display:"flex",borderBottom:"2px solid #F0F0F0"}});
      [["lab","\uD83D\uDD2C Lab Website"],["upload","\uD83D\uDCE4 Upload"]].forEach(([id,lbl])=>{
        const tb=btn({style:{background:"none",border:"none",padding:"7px 16px",fontSize:"13px",fontWeight:"600",cursor:"pointer",color:pickTab===id?"#1a1a2e":"#aaa",borderBottom:pickTab===id?"2px solid #4ECDC4":"2px solid transparent",marginBottom:"-2px"}},[lbl]);
        tb.addEventListener("click",()=>{pickTab=id;rebuild()});
        tabs.appendChild(tb);
      });
      mHead.appendChild(tabs);modal.appendChild(mHead);
      const mBody=div({style:{flex:"1",overflowY:"auto",padding:"14px 18px 20px"}});
      if(pickTab==="lab"){
        const grid=div({style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"10px"}});
        GALLERY.forEach(m=>{
          const sel2=me.photo===m.photo;
          const gb=btn({style:{background:"none",border:"2px solid "+(sel2?"#4ECDC4":"transparent"),borderRadius:"14px",padding:"8px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:"5px",outline:"none"}});
          const imgWrap=div({style:{width:"60px",height:"60px",borderRadius:"50%",overflow:"hidden",background:"#F0F0F0",border:"3px solid "+(sel2?"#4ECDC4":"transparent"),position:"relative",flexShrink:"0"}});
          if(!pickErrs[m.email]){
            const pi=img_({src:m.photo,alt:"",style:{width:"100%",height:"100%",objectFit:"cover"}});
            pi.onerror=()=>{pickErrs[m.email]=1;imgWrap.innerHTML="\uD83D\uDC64"};
            imgWrap.appendChild(pi);
          } else {
            imgWrap.textContent="\uD83D\uDC64";
          }
          gb.appendChild(imgWrap);
          gb.appendChild(span({style:{fontSize:"10px",color:sel2?"#4ECDC4":"#666",fontWeight:"600",textAlign:"center",lineHeight:"1.3"}},
            [(m.title?m.title+" ":"")+m.full.split(" ").slice(0,2).join(" ")]));
          if(sel2)gb.appendChild(span({style:{fontSize:"9px",color:"#4ECDC4",fontWeight:"700"}},["\u2713"]));
          gb.addEventListener("click",()=>{
            const newP=STATE.people.map(pp=>pp.email===STATE.session?{...pp,photo:m.photo}:pp);
            setState({people:newP});showPick=false;toast3("Photo updated \u2713");
          });
          grid.appendChild(gb);
        });
        mBody.appendChild(grid);
      } else {
        const upDiv=div({style:{display:"flex",flexDirection:"column",alignItems:"center",gap:"16px",paddingTop:"20px"}});
        const prevDiv=div({style:{width:"96px",height:"96px",borderRadius:"50%",background:"#F5F7FA",border:"3px dashed #DDD",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"32px",overflow:"hidden"}});
        if(me.photo?.startsWith("data:")){const pi=img_({src:me.photo,alt:"",style:{width:"100%",height:"100%",objectFit:"cover",borderRadius:"50%"}});prevDiv.appendChild(pi)}
        else prevDiv.textContent="\uD83D\uDCF7";
        upDiv.appendChild(prevDiv);
        const fileInp=inp({type:"file",accept:"image/*",style:{display:"none"}});
        fileInp.addEventListener("change",e=>{
          const f=e.target.files?.[0];if(!f)return;
          const r=new FileReader();
          r.onload=ev=>{const newP=STATE.people.map(pp=>pp.email===STATE.session?{...pp,photo:ev.target.result}:pp);setState({people:newP});showPick=false;toast3("Photo updated \u2713")};
          r.readAsDataURL(f);
        });
        upDiv.appendChild(fileInp);
        upDiv.appendChild(Btn("\uD83D\uDCE4 Choose File",()=>fileInp.click(),"dark"));
        if(me.photo){
          const rmB=btn({style:{background:"none",border:"none",color:"#dc3545",fontSize:"13px",cursor:"pointer",textDecoration:"underline"}},["\u2715 Remove photo"]);
          rmB.addEventListener("click",()=>{const newP=STATE.people.map(pp=>pp.email===STATE.session?{...pp,photo:null}:pp);setState({people:newP});showPick=false;toast3("Photo removed")});
          upDiv.appendChild(rmB);
        }
        mBody.appendChild(upDiv);
      }
      modal.appendChild(mBody);overlay.appendChild(modal);page.appendChild(overlay);
    }

    wrap.appendChild(page);
  }
  rebuild();return wrap;
}

// ── TOP BAR ───────────────────────────────────────────────────
function TopBar(){
  const me=STATE.people.find(p=>p.email===STATE.session)||{};
  const bar=div({style:{background:"#fff",padding:"12px 15px",borderBottom:"1px solid #EBEBEB",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:"0",zIndex:"50",boxShadow:"0 1px 8px rgba(0,0,0,.06)"}});
  const left=div();
  left.appendChild(div({style:{fontSize:"18px",fontWeight:"700",color:"#1a1a2e"}},["LabDuties"]));
  left.appendChild(div({style:{fontSize:"10px",color:"#ccc"}},["\uD83D\uDD50 Asia/Jerusalem \u00B7 "+fmtD(TODAY)]));
  bar.appendChild(left);
  const right=div({style:{display:"flex",alignItems:"center",gap:"10px"}});
  right.appendChild(RoleBadge(me.role||"Member"));
  const avB=div({style:{cursor:"pointer"}});
  avB.addEventListener("click",()=>setState({page:"profile"}));
  avB.appendChild(Avatar(me,36));

}

// ── BOTTOM NAV ────────────────────────────────────────────────
function BottomNav(){
  const items=[
    {id:"dashboard",icon:"\uD83C\uDFE0",label:"Home"},
    ...(isSched()?[
      {id:"schedule",icon:"\uD83D\uDCC5",label:"Schedule"},
      {id:"people",icon:"\uD83D\uDC65",label:"People"},
      {id:"tasks",icon:"\uD83D\uDCCB",label:"Tasks"},
      {id:"settings",icon:"\u2699\uFE0F",label:"Settings"},
    ]:[]),
    {id:"profile",icon:"\uD83D\uDC64",label:"Profile"},
  ];
  const nav=div({style:{position:"fixed",bottom:"0",left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:"480px",background:"#fff",borderTop:"1px solid #EBEBEB",display:"flex",justifyContent:"space-around",padding:"6px 0 10px",zIndex:"100",boxShadow:"0 -4px 20px rgba(0,0,0,.06)"}});
  items.forEach(item=>{
    const b=btn({style:{background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:"2px",padding:"3px 10px",color:STATE.page===item.id?"#1a1a2e":"#BBB",minWidth:"0"}});
    b.appendChild(span({style:{fontSize:"19px"}},[item.icon]));
    b.appendChild(span({style:{fontSize:"9px",fontWeight:"600"}},[item.label]));
    if(STATE.page===item.id)b.appendChild(div({style:{width:"4px",height:"4px",borderRadius:"50%",background:"#4ECDC4"}}));
    b.addEventListener("click",()=>setState({page:item.id}));
    nav.appendChild(b);
  });
  return nav;
}

// ── MODALS ────────────────────────────────────────────────────
function Modals(){
  const frags=[];

  // Toast
  if(STATE.toast){
    frags.push(div({className:"fade",style:{position:"fixed",bottom:"82px",left:"50%",transform:"translateX(-50%)",background:"#1a1a2e",color:"#fff",padding:"10px 20px",borderRadius:"12px",fontSize:"13px",fontWeight:"500",boxShadow:"0 8px 24px rgba(0,0,0,.3)",zIndex:"999",whiteSpace:"nowrap",maxWidth:"88vw",overflow:"hidden",textOverflow:"ellipsis"}},
      [STATE.toast]));
  }

  // Confirm delete
  if(STATE.confirmDel){
    const overlay=div({className:"fade",style:{position:"fixed",inset:"0",background:"rgba(0,0,0,.55)",zIndex:"2000",display:"flex",alignItems:"center",justifyContent:"center",padding:"20px"}});
    const modal=div({style:{background:"#fff",borderRadius:"20px",padding:"28px 24px",width:"100%",maxWidth:"360px",textAlign:"center",boxShadow:"0 24px 60px rgba(0,0,0,.35)"}});
    modal.appendChild(div({style:{fontSize:"40px",marginBottom:"12px"}},["\u26A0\uFE0F"]));
    modal.appendChild(h3_({style:{fontSize:"20px",marginBottom:"8px"}},["Delete account?"]));
    const p1=document.createElement("p");p1.style.cssText="font-size:14px;color:#666;margin-bottom:6px";
    p1.innerHTML="Delete <strong>"+STATE.confirmDel.name+"</strong>'s account?";
    modal.appendChild(p1);
    modal.appendChild(p_({style:{fontSize:"12px",color:"#dc3545",marginBottom:"24px"}},["This cannot be undone."]));
    const btnRow=div({style:{display:"flex",gap:"12px"}});
    btnRow.appendChild(Btn("Cancel",()=>setState({confirmDel:null}),"ghost",{full:true}));
    btnRow.appendChild(Btn("Delete Account",()=>{
      const emailToDel=STATE.confirmDel.email;
      const users=LS.get("ld_users",{});delete users[emailToDel];LS.set("ld_users",users);
      if(emailToDel===STATE.session){LS.del("ld_session");LS.del("ld_remember");setState({session:null,authPage:"login",confirmDel:null})}
      else{setState({confirmDel:null});toast3("Account deleted.")}
    },"red",{full:true}));
    modal.appendChild(btnRow);overlay.appendChild(modal);frags.push(overlay);
  }

  // Auto-prompt
  if(STATE.autoPrompt){
    const overlay=div({className:"fade",style:{position:"fixed",inset:"0",background:"rgba(0,0,0,.55)",zIndex:"2000",display:"flex",alignItems:"center",justifyContent:"center",padding:"20px"}});
    const modal=div({style:{background:"#fff",borderRadius:"20px",padding:"28px 24px",width:"100%",maxWidth:"360px",textAlign:"center",boxShadow:"0 24px 60px rgba(0,0,0,.35)"}});
    modal.appendChild(div({style:{fontSize:"40px",marginBottom:"12px"}},["\u23F0"]));
    modal.appendChild(h3_({style:{fontSize:"22px",marginBottom:"8px"}},["Scheduled time!"]));
    const ap=STATE.autoPrompt;
    const mp=document.createElement("p");mp.style.cssText="font-size:14px;color:#666;margin-bottom:24px";
    mp.innerHTML="It's time for <strong>"+ap.label+"</strong>. Send now?";
    modal.appendChild(mp);
    const btnRow=div({style:{display:"flex",gap:"12px"}});
    btnRow.appendChild(Btn("Dismiss",()=>setState({autoPrompt:null}),"ghost",{full:true}));
    btnRow.appendChild(Btn("Send Now \u2192",()=>{
      if(ap.type==="thursday")sendThursdayReport();else sendReminders(TODAY);
      const dk=toStr(TODAY);
      const key=ap.type==="day_of"?"ld_s_dof_"+dk:"ld_s_db_"+dk;
      LS.set(key,true);setState({autoPrompt:null});
    },"teal",{full:true}));
    modal.appendChild(btnRow);overlay.appendChild(modal);frags.push(overlay);
  }

  // Email log
  if(STATE.showLog){
    const overlay=div({className:"fade",style:{position:"fixed",inset:"0",background:"rgba(0,0,0,.5)",zIndex:"1000",display:"flex",alignItems:"flex-end"}});
    const sheet=div({style:{background:"#fff",borderRadius:"20px 20px 0 0",padding:"22px",width:"100%",maxHeight:"70vh",overflowY:"auto",boxShadow:"0 -8px 40px rgba(0,0,0,.2)"}});
    const headRow=div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px"}});
    headRow.appendChild(h3_({style:{fontSize:"19px"}},["\uD83D\uDCEC Sent Email Log"]));
    const closeB=btn({style:{background:"#eee",border:"none",borderRadius:"99px",width:"30px",height:"30px",cursor:"pointer"}},["\u2715"]);
    closeB.addEventListener("click",()=>setState({showLog:false}));
    headRow.appendChild(closeB);sheet.appendChild(headRow);
    if(STATE.emailLog.length===0){
      sheet.appendChild(p_({style:{color:"#999",fontSize:"13px"}},["No emails sent yet."]));
    } else {
      STATE.emailLog.forEach(e=>{
        const card=div({style:{border:"1px solid #EBEBEB",borderRadius:"12px",padding:"12px 14px",marginBottom:"9px"}});
        const eHead=div({style:{display:"flex",justifyContent:"space-between",marginBottom:"3px"}});
        eHead.appendChild(span({style:{fontWeight:"600",fontSize:"13px"}},[e.sub]));
        eHead.appendChild(span({style:{fontSize:"10px",color:"#aaa",marginLeft:"8px",flexShrink:"0"}},[e.at]));
        card.appendChild(eHead);
        card.appendChild(div({style:{fontSize:"11px",color:"#888"}},["\uD83D\uDCE7 To: "+e.to]));
        if(e.cc)card.appendChild(div({style:{fontSize:"11px",color:"#aaa"}},["\u21B3 CC: "+e.cc]));
        const body=div({style:{fontSize:"12px",color:"#555",marginTop:"5px",lineHeight:"1.6",whiteSpace:"pre-line",maxHeight:"80px",overflow:"auto"}});
        body.textContent=e.body;card.appendChild(body);sheet.appendChild(card);
      });
    }
    overlay.appendChild(sheet);frags.push(overlay);
    overlay.addEventListener("click",e=>{if(e.target===overlay)setState({showLog:false})});
  }

  return frags;
}

// ── RENDER ────────────────────────────────────────────────────
function render(){
  const app=document.getElementById("app");
  app.innerHTML="";

  if(!STATE.session){
    const pages={login:LoginPage,register:RegisterPage,forgot:ForgotPage};
    const PageFn=pages[STATE.authPage]||LoginPage;
    app.appendChild(AuthShell(PageFn()));
    return;
  }

  // Main app
  app.appendChild(TopBar());
  const content=div({style:{padding:"16px 13px 96px"}});
  const PAGES={dashboard:DashboardPage,schedule:SchedulePage,tasks:TasksPage,people:PeoplePage,settings:SettingsPage,profile:ProfilePage};
  const PageFn=PAGES[STATE.page]||DashboardPage;
  content.appendChild(PageFn());
  app.appendChild(content);
  app.appendChild(BottomNav());
  Modals().forEach(m=>app.appendChild(m));

  // Start/restart auto-reminder interval
  if(STATE.reminderInterval)clearInterval(STATE.reminderInterval);
  if(isSched()){
    STATE.reminderInterval=setInterval(()=>{
      if(!STATE.autoPrompt){
        const now=nowHHMM();const dk=toStr(TODAY);
        if(now===STATE.settings.time_day_of&&!LS.get("ld_s_dof_"+dk,false))setState({autoPrompt:{type:"day_of",label:"Day-of reminders"}});
        else if(now===STATE.settings.time_day_before&&!LS.get("ld_s_db_"+dk,false))setState({autoPrompt:{type:"day_before",label:"Day-before reminders"}});
        else{const thu=new Date(TODAY);thu.setDate(TODAY.getDate()+((4-TODAY.getDay()+7)%7));if(toStr(TODAY)===toStr(thu)&&now===STATE.settings.time_thursday&&!LS.get("ld_s_rep_"+dk,false))setState({autoPrompt:{type:"thursday",label:"Thursday report"}})}
      }
    },30000);
  }
}

// Boot — preload all gallery photos early so they're cached
GALLERY.forEach(g=>{
  if(g.photo){
    const i=new Image();
    i.src=g.photo;
  }
});
render();
</script>
